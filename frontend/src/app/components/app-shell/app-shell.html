<div class="flex min-h-screen bg-slate-50">
  <aside
    [id]="sidebarId"
    class="fixed inset-y-0 left-0 z-20 flex flex-col border-r border-slate-600 bg-slate-500 shadow-lg transition-[width] duration-200"
    [class.w-60]="sidebarExpanded()"
    [class.w-16]="!sidebarExpanded()"
    (mouseenter)="onSidebarEnter()"
    (mouseleave)="onSidebarLeave()"
    (focusin)="onSidebarFocusIn()"
    (focusout)="onSidebarFocusOut($event)"
  >
    <div
      class="flex h-16 items-center border-b border-slate-600 px-3"
      [class.justify-center]="!sidebarExpanded()"
      [class.justify-between]="sidebarExpanded()"
    >
      @if (sidebarExpanded()) {
        <div class="flex min-w-0 items-center gap-3">
          <span
            class="flex size-8 shrink-0 items-center justify-center rounded-md bg-white text-sm font-bold text-slate-500 shadow-sm"
            aria-hidden="true"
          >
            A
          </span>
          <div class="min-w-0">
            <p class="truncate text-sm font-semibold tracking-wide text-white">
              {{ 'APP_SHELL.APP_NAME' | translate }}
            </p>
            <p class="truncate text-[0.6875rem] text-slate-200">
              {{ 'APP.TITLE' | translate }}
            </p>
          </div>
        </div>
      }
      <button
        type="button"
        class="inline-flex size-9 shrink-0 items-center justify-center rounded-md border border-slate-600 bg-slate-700 text-slate-200 transition-colors hover:border-slate-600 hover:bg-slate-400 hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400"
        [attr.aria-label]="'APP_SHELL.TOGGLE_SIDEBAR' | translate"
        [attr.aria-expanded]="sidebarExpanded()"
        [attr.aria-controls]="sidebarId"
        (click)="toggleSidebar()"
      >
        <svg
          class="size-5"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          aria-hidden="true"
        >
          @if (sidebarExpanded()) {
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6" />
          } @else {
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 18l6-6-6-6" />
          }
        </svg>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto">
      <app-sidebar-nav [expanded]="sidebarExpanded()" />
    </div>
  </aside>

  <div
    class="flex min-h-screen min-w-0 flex-1 flex-col transition-[margin] duration-200"
    [class.ml-60]="sidebarExpanded()"
    [class.ml-16]="!sidebarExpanded()"
  >
    <header
      role="banner"
      class="sticky top-0 z-10 flex h-16 items-center justify-between gap-4 border-b border-slate-200 bg-white px-4 shadow-xs md:px-6"
    >
      <div class="flex min-w-0 items-center gap-3">
        <button
          type="button"
          class="inline-flex size-9 shrink-0 items-center justify-center rounded-md border border-slate-200 bg-white text-slate-700 hover:bg-slate-50 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400 md:hidden"
          [attr.aria-label]="'APP_SHELL.TOGGLE_SIDEBAR' | translate"
          [attr.aria-expanded]="sidebarExpanded()"
          [attr.aria-controls]="sidebarId"
          (click)="toggleSidebar()"
        >
          <svg
            class="size-5"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            aria-hidden="true"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 7h16M4 12h16M4 17h16" />
          </svg>
        </button>
        <h1 class="truncate text-lg font-semibold tracking-tight text-slate-900">
          {{ pageTitleKey() | translate }}
        </h1>
      </div>

      <div class="flex shrink-0 items-center gap-2 border-l border-slate-200 pl-3">
        <app-language-switcher />
        <button
          type="button"
          class="inline-flex h-9 items-center gap-2 rounded-md border border-slate-200 bg-white px-3 text-sm font-medium text-slate-700 shadow-sm transition-colors hover:border-slate-300 hover:bg-slate-50 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-300"
          (click)="logout()"
        >
          <svg
            class="size-4 text-slate-500"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            aria-hidden="true"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M14 8V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h7a2 2 0 0 0 2-2v-3M9 12h12m0 0-3-3m3 3-3 3"
            />
          </svg>
          {{ 'AUTH.LOGOUT' | translate }}
        </button>
      </div>
    </header>

    <main class="flex-1 p-4 md:p-6" [attr.aria-label]="'APP_SHELL.CONTENT_AREA' | translate">
      <div class="rounded-md border border-slate-200 bg-white p-4 md:p-6">
        <router-outlet />
      </div>
    </main>

    <footer class="border-t border-slate-200 bg-white px-4 py-3 text-center text-xs text-slate-500">
      <span>{{ 'APP_SHELL.DEVELOPED_BY' | translate }}</span>
      <a
        href="https://lightburden.net"
        target="_blank"
        rel="noopener noreferrer"
        class="ml-1 font-medium text-slate-700 transition-colors hover:text-slate-950 hover:underline focus:outline-none focus-visible:rounded-sm focus-visible:ring-2 focus-visible:ring-slate-400"
      >
        Francis Santiago
      </a>
    </footer>
  </div>
</div>
