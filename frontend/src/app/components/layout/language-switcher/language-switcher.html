<label class="relative block">
  <span class="sr-only">{{ 'COMMON.LANGUAGE' | translate }}</span>
  <svg
    class="pointer-events-none absolute top-1/2 left-3 size-4 -translate-y-1/2 text-slate-500"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="1.75"
    aria-hidden="true"
  >
    <circle cx="12" cy="12" r="9" />
    <path
      stroke-linecap="round"
      d="M3.5 9h17M3.5 15h17M12 3c2.1 2.5 3.2 5.5 3.2 9S14.1 18.5 12 21M12 3c-2.1 2.5-3.2 5.5-3.2 9s1.1 6.5 3.2 9"
    />
  </svg>
  <select
    class="h-9 min-w-36 appearance-none rounded-md border border-slate-200 bg-white py-1.5 pr-9 pl-9 text-sm font-medium text-slate-700 shadow-sm outline-none transition-colors hover:border-slate-300 hover:bg-slate-50 focus:border-slate-400 focus:ring-2 focus:ring-slate-200"
    (change)="onLanguageChange($event)"
    [attr.aria-label]="'COMMON.LANGUAGE' | translate"
  >
    @for (language of i18n.languages; track language.code) {
      <option [value]="language.code" [selected]="language.code === i18n.currentLang()">
        {{ language.labelKey | translate }}
      </option>
    }
  </select>
  <svg
    class="pointer-events-none absolute top-1/2 right-3 size-4 -translate-y-1/2 text-slate-400"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="1.75"
    aria-hidden="true"
  >
    <path stroke-linecap="round" stroke-linejoin="round" d="m8 10 4 4 4-4" />
  </svg>
</label>
