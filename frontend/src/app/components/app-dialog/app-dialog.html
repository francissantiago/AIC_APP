<dialog
  #dialogEl
  class="m-auto w-[calc(100%-2rem)] max-w-2xl rounded-lg border border-slate-200 bg-white p-0 text-slate-900 shadow-lg backdrop:bg-slate-900/50"
  aria-modal="true"
  [attr.aria-labelledby]="titleId"
  (click)="onBackdropClick($event)"
  (cancel)="onCancel($event)"
  (close)="onNativeClose()"
>
  <div class="flex max-h-[min(90vh,50rem)] w-full flex-col overflow-hidden">
    <header
      class="flex shrink-0 items-start justify-between gap-3 border-b border-slate-200 px-4 py-3"
    >
      <h2 [id]="titleId" class="text-lg font-semibold text-slate-900">
        {{ title() }}
      </h2>
      <button
        type="button"
        class="inline-flex size-8 shrink-0 items-center justify-center rounded-md text-slate-600 hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400"
        [attr.aria-label]="'COMMON.DIALOG.CLOSE_ARIA' | translate"
        (click)="requestClose()"
      >
        <span aria-hidden="true" class="text-xl leading-none">&times;</span>
      </button>
    </header>
    <div class="min-h-0 flex-1 overflow-y-auto px-4 py-4">
      <ng-content />
    </div>
  </div>
</dialog>
