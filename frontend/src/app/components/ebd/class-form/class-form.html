<section class="w-full">
  @if (feedbackKey(); as key) {
    <p
      class="mb-4 rounded-md px-3 py-2 text-sm"
      [class.bg-emerald-50]="key === 'EBD_CLASSES.SAVE_SUCCESS'"
      [class.text-emerald-900]="key === 'EBD_CLASSES.SAVE_SUCCESS'"
      [class.bg-red-50]="key !== 'EBD_CLASSES.SAVE_SUCCESS'"
      [class.text-red-800]="key !== 'EBD_CLASSES.SAVE_SUCCESS'"
      role="alert"
    >
      {{ key | translate }}
    </p>
  }

  @if (errorMessage(); as message) {
    <p class="mb-4 rounded-md bg-red-50 px-3 py-2 text-sm text-red-800" role="alert">
      {{ message }}
      @if (supportHint(); as hint) {
        <span class="mt-1 block text-xs opacity-90">{{ hint }}</span>
      }
    </p>
  }

  @if (loading()) {
    <p class="text-sm text-slate-600" role="status">{{ 'COMMON.LOADING' | translate }}</p>
  } @else if (loadError()) {
    <p class="text-sm text-red-700" role="alert">{{ 'EBD_CLASSES.LOAD_ERROR' | translate }}</p>
  } @else {
    <form [formGroup]="form" (ngSubmit)="submit()" class="grid gap-4" novalidate>
      <label class="flex flex-col gap-1 text-sm text-slate-700">
        <span>{{ 'EBD_CLASSES.NAME' | translate }}</span>
        <input
          type="text"
          formControlName="name"
          maxlength="120"
          class="rounded-md border border-slate-200 px-3 py-2 focus:border-slate-500 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400"
          [attr.aria-invalid]="fieldInvalid('name')"
        />
        @if (fieldInvalid('name')) {
          <span class="text-xs text-red-700">{{ 'COMMON.REQUIRED_FIELD' | translate }}</span>
        }
      </label>

      <label class="flex flex-col gap-1 text-sm text-slate-700">
        <span>{{ 'EBD_CLASSES.DESCRIPTION' | translate }}</span>
        <textarea
          formControlName="description"
          rows="3"
          maxlength="255"
          class="rounded-md border border-slate-200 px-3 py-2 focus:border-slate-500 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400"
        ></textarea>
      </label>

      <label class="flex flex-col gap-1 text-sm text-slate-700">
        <span>{{ 'EBD_CLASSES.AGE_GROUP' | translate }}</span>
        <select
          formControlName="ageGroup"
          class="rounded-md border border-slate-200 px-3 py-2 focus:border-slate-500 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400"
        >
          @for (ageGroup of ageGroups; track ageGroup) {
            <option [value]="ageGroup">{{ ageGroupLabelKey(ageGroup) | translate }}</option>
          }
        </select>
      </label>

      <label class="flex flex-col gap-1 text-sm text-slate-700">
        <span>{{ 'EBD_CLASSES.TEACHER' | translate }}</span>
        <select
          formControlName="teacherMemberId"
          class="rounded-md border border-slate-200 px-3 py-2 focus:border-slate-500 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400"
        >
          <option value="">{{ 'EBD_CLASSES.TEACHER_OPTIONAL' | translate }}</option>
          @for (teacher of teacherOptions(); track teacher.id) {
            <option [value]="teacher.id">{{ teacher.fullName }}</option>
          }
        </select>
      </label>

      <label class="flex flex-col gap-1 text-sm text-slate-700">
        <span>{{ 'EBD_CLASSES.DAY_OF_WEEK' | translate }}</span>
        <select
          formControlName="dayOfWeek"
          class="rounded-md border border-slate-200 px-3 py-2 focus:border-slate-500 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400"
        >
          @for (day of daysOfWeek; track day) {
            <option [value]="day">{{ dayLabelKey(day) | translate }}</option>
          }
        </select>
      </label>

      <label class="flex flex-col gap-1 text-sm text-slate-700">
        <span>{{ 'EBD_CLASSES.START_TIME' | translate }}</span>
        <input
          type="time"
          formControlName="startTime"
          class="rounded-md border border-slate-200 px-3 py-2 focus:border-slate-500 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400"
        />
      </label>

      <label class="flex flex-col gap-1 text-sm text-slate-700">
        <span>{{ 'EBD_CLASSES.ROOM' | translate }}</span>
        <input
          type="text"
          formControlName="room"
          maxlength="80"
          class="rounded-md border border-slate-200 px-3 py-2 focus:border-slate-500 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400"
        />
      </label>

      <label class="flex flex-col gap-1 text-sm text-slate-700">
        <span>{{ 'EBD_CLASSES.STATUS' | translate }}</span>
        <select
          formControlName="status"
          class="rounded-md border border-slate-200 px-3 py-2 focus:border-slate-500 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400"
        >
          @for (status of statuses; track status) {
            <option [value]="status">{{ statusLabelKey(status) | translate }}</option>
          }
        </select>
      </label>

      <div class="mt-2 flex flex-wrap gap-3">
        <button
          type="submit"
          class="rounded-md bg-slate-500 px-4 py-2 text-sm font-medium text-white hover:bg-slate-600 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-600 disabled:opacity-50"
          [disabled]="saving()"
        >
          {{ 'EBD_CLASSES.SAVE' | translate }}
        </button>
        <button
          type="button"
          class="rounded-md border border-slate-300 bg-white px-4 py-2 text-sm text-slate-800 hover:bg-slate-50 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400"
          (click)="cancelled.emit()"
        >
          {{ 'EBD_CLASSES.CANCEL' | translate }}
        </button>
      </div>
    </form>
  }
</section>
