<nav [attr.aria-label]="'NAV.MAIN_NAV' | translate">
  <ul class="flex flex-col gap-1 px-2 py-2">
    @for (item of items; track item.route) {
      <li>
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-slate-100 text-slate-900 border-slate-900"
          class="flex items-center gap-3 rounded-md border-l-2 border-transparent px-2.5 py-2 text-sm text-slate-600 hover:bg-slate-50 hover:text-slate-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400"
          [class.justify-center]="!expanded()"
          [attr.aria-label]="expanded() ? null : (item.labelKey | translate)"
          [attr.title]="expanded() ? null : (item.labelKey | translate)"
        >
          @switch (item.icon) {
            @case ('users') {
              <svg
                class="size-5 shrink-0 text-slate-500"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"
                />
                <circle cx="9" cy="7" r="4" />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"
                />
              </svg>
            }
            @case ('roles') {
              <svg
                class="size-5 shrink-0 text-slate-500"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"
                />
              </svg>
            }
            @case ('members') {
              <svg
                class="size-5 shrink-0 text-slate-500"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"
                />
                <circle cx="9" cy="7" r="4" />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"
                />
              </svg>
            }
            @case ('congregation') {
              <svg
                class="size-5 shrink-0 text-slate-500"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                aria-hidden="true"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-6h6v6"
                />
              </svg>
            }
          }
          @if (expanded()) {
            <span class="truncate">{{ item.labelKey | translate }}</span>
          }
        </a>
      </li>
    }
  </ul>
</nav>
